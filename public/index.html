<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Watchlist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="mb-0">My Movie Watchlist</h1>
      <span class="badge bg-warning text-dark fs-6" id="counter">0 to watch</span>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-6">
            <input type="text" id="titleInput" class="form-control" placeholder="Movie title...">
          </div>
          <div class="col-md-4">
            <select id="genreSelect" class="form-select">
              <option value="">Select genre...</option>
              <option value="Action">Action</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option>
              <option value="Horror">Horror</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Romance">Romance</option>
              <option value="Thriller">Thriller</option>
              <option value="Animation">Animation</option>
            </select>
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100" id="addBtn">Add</button>
          </div>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <button class="btn btn-outline-secondary active me-2" id="filterAll" onclick="setFilter('all')">All</button>
      <button class="btn btn-outline-secondary me-2" id="filterUnwatched" onclick="setFilter('unwatched')">To Watch</button>
      <button class="btn btn-outline-secondary" id="filterWatched" onclick="setFilter('watched')">Watched</button>
    </div>

    <div id="movieList"></div>

    <div id="alertBox" class="alert d-none position-fixed bottom-0 end-0 m-3" role="alert"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Movie</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" id="editTitle" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Genre</label>
            <select id="editGenre" class="form-select">
              <option value="Action">Action</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option>
              <option value="Horror">Horror</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Romance">Romance</option>
              <option value="Thriller">Thriller</option>
              <option value="Animation">Animation</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Rating</label>
            <select id="editRating" class="form-select">
              <option value="">No rating</option>
              <option value="1">1 ★</option>
              <option value="2">2 ★★</option>
              <option value="3">3 ★★★</option>
              <option value="4">4 ★★★★</option>
              <option value="5">5 ★★★★★</option>
            </select>
          </div>
          <div class="form-check">
            <input type="checkbox" id="editWatched" class="form-check-input">
            <label class="form-check-label" for="editWatched">Watched</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="saveEditBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
